<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Frequência DJP</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">📊 Controle de Frequência DJP</span>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <main>
            <!-- Formulário -->
            <section class="mb-5">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">✏️ Registrar Frequência</h5>
                    </div>
                    <div class="card-body">
                        <form id="frequencyForm">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="igreja" class="form-label">Igreja:</label>
                                    <select id="igreja" class="form-select" required>
                                        <option value="">Selecione uma igreja</option>
                                        <option value="Igreja Central">Igreja Central</option>
                                        <option value="Igreja Norte">Igreja Norte</option>
                                        <option value="Igreja Sul">Igreja Sul</option>
                                        <option value="Igreja Leste">Igreja Leste</option>
                                        <option value="Igreja Oeste">Igreja Oeste</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="data" class="form-label">Data:</label>
                                    <input type="date" id="data" class="form-control" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-3">
                                    <label for="pessoas" class="form-label">Número de Pessoas:</label>
                                    <input type="number" id="pessoas" class="form-control" min="0" required>
                                </div>
                                <div class="col-md-3">
                                    <label for="criancas" class="form-label">Crianças:</label>
                                    <input type="number" id="criancas" class="form-control" min="0" required>
                                </div>
                                <div class="col-md-3">
                                    <label for="veiculos" class="form-label">Veículos:</label>
                                    <input type="number" id="veiculos" class="form-control" min="0" required>
                                </div>
                                <div class="col-md-3">
                                    <label for="convidadas" class="form-label">Convidadas:</label>
                                    <input type="number" id="convidadas" class="form-control" min="0" required>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">💾 Salvar</button>
                                <button type="reset" class="btn btn-secondary">🔄 Limpar</button>
                            </div>
                        </form>
                        <div id="mensagem" class="alert alert-info mt-3 d-none"></div>
                    </div>
                </div>
            </section>

            <!-- Gráfico -->
            <section class="mb-5">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">📈 Últimos 10 Domingos</h5>
                    </div>
                    <div class="card-body">
                        <div class="chart-container">
                            <canvas id="frequencyChart"></canvas>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Estatísticas -->
            <section>
                <h5 class="mb-4">📋 Estatísticas</h5>
                <div class="row g-3">
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card shadow-sm border-0 bg-info text-white">
                            <div class="card-body text-center">
                                <h6 class="card-title">Total de Pessoas</h6>
                                <h2 id="totalPessoas" class="mb-0">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card shadow-sm border-0 bg-warning text-dark">
                            <div class="card-body text-center">
                                <h6 class="card-title">Média de Pessoas</h6>
                                <h2 id="mediaPessoas" class="mb-0">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card shadow-sm border-0 bg-danger text-white">
                            <div class="card-body text-center">
                                <h6 class="card-title">Total de Crianças</h6>
                                <h2 id="totalCriancas" class="mb-0">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6 col-lg-3">
                        <div class="card stat-card shadow-sm border-0 bg-secondary text-white">
                            <div class="card-body text-center">
                                <h6 class="card-title">Total de Veículos</h6>
                                <h2 id="totalVeiculos" class="mb-0">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0">&copy; 2026 Controle de Frequência DJP</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
